{% extends "poll_portal/base.html" %}
{% block title %}Vote{% endblock %}
{% block main %}
<div class="row justify-content-center" style="margin-top:1rem;margin-bottom:3rem;">
  <div class="col-md-8 col-lg-6">
    <div class="d-flex align-items-center gap-2 mb-3">
      <a href="{% url 'home' %}" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left"></i>
      </a>
      <span class="text-muted" style="font-size:.85rem;">Back to polls</span>
    </div>
    <div class="card shadow" style="border-radius:20px;">
      <div class="card-header card-header-indigo">
        <div style="font-size:.72rem;opacity:.75;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:.4rem;">
          <i class="bi bi-hand-index-thumb me-1"></i>Cast Your Vote
        </div>
        <h5 class="mb-0 fw-bold" style="font-size:1.05rem;line-height:1.4;">{{ poll.question }}</h5>
      </div>
      <div class="card-body p-4">
        <p class="text-muted mb-3" style="font-size:.85rem;">Select one option below — you can only vote once.</p>
        <form method="POST" id="voteForm">
          {% csrf_token %}
          <div class="d-flex flex-column gap-3 mb-4">
            <label class="vote-option" style="border-radius:14px;">
              <input type="radio" name="poll" value="option1">
              <div>
                <div style="font-weight:600;color:#0f172a;font-size:.92rem;">{{ poll.option_one }}</div>
              </div>
            </label>
            <label class="vote-option" style="border-radius:14px;">
              <input type="radio" name="poll" value="option2">
              <div>
                <div style="font-weight:600;color:#0f172a;font-size:.92rem;">{{ poll.option_two }}</div>
              </div>
            </label>
            <label class="vote-option" style="border-radius:14px;">
              <input type="radio" name="poll" value="option3">
              <div>
                <div style="font-weight:600;color:#0f172a;font-size:.92rem;">{{ poll.option_three }}</div>
              </div>
            </label>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary px-4 py-2">
              <i class="bi bi-check2-square me-2"></i>Submit Vote
            </button>
            <a href="{% url 'home' %}" class="btn btn-outline-secondary px-4 py-2">Cancel</a>
          </div>
        </form>
      </div>
      <div class="card-footer d-flex align-items-center gap-2" style="font-size:.8rem;color:#64748b;">
        <i class="bi bi-shield-lock-fill" style="color:#2563eb;"></i>
        Your vote is secure and can only be cast once per poll.
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% extends "poll_portal/base.html" %}
{% block title %}Login{% endblock %}
{% block main %}
<div class="row justify-content-center" style="margin-top:2rem;margin-bottom:3rem;">
  <div class="col-sm-9 col-md-6 col-lg-4">

    <div class="text-center mb-4">
      <div style="width:60px;height:60px;background:linear-gradient(135deg,#2563eb,#1d4ed8);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;box-shadow:0 8px 24px rgba(37,99,235,.35);">
        <i class="bi bi-bar-chart-line-fill" style="font-size:1.6rem;color:#fff;"></i>
      </div>
      <h2 style="font-weight:800;color:#0f172a;font-size:1.7rem;margin-bottom:.25rem;">Welcome back</h2>
      <p class="text-muted" style="font-size:.88rem;">Sign in to your VoteSphere account</p>
    </div>

    <div class="card shadow-lg" style="border-radius:20px;">
      <div class="card-body p-4">
        <form method="POST">
          {% csrf_token %}
          <input type="hidden" name="next" value="{{ next }}">
          <div class="mb-3">
            <label class="form-label">Username</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person-fill" style="color:#2563eb;"></i></span>
              <input type="text" name="username" class="form-control" placeholder="Enter your username" required autofocus>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock-fill" style="color:#2563eb;"></i></span>
              <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100 py-2" style="font-size:.95rem;">
            <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
          </button>
        </form>
      </div>
      <div class="card-footer text-center" style="font-size:.875rem;">
        No account? <a href="{% url 'register' %}" style="color:#2563eb;font-weight:700;text-decoration:none;">Create one free</a>
      </div>
    </div>

  </div>
</div>
{% endblock %}
